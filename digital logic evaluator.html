<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fundamental Logic Gates Demo</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
            background-color: #0b0f19;
            color: #f8fafc;
            padding: 30px 15px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .bench-container {
            width: 100%;
            max-width: 900px;
            background-color: #151d30;
            border: 1px solid #24324f;
            border-radius: 12px;
            padding: 24px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.3);
        }
        .header-title {
            text-align: center;
            margin-bottom: 20px;
        }
        .header-title h2 {
            font-size: 1.6rem;
            color: #38bdf8;
            margin-bottom: 4px;
        }
                .control-strip {
            display: flex;
            justify-content: center;
            background-color: #0e1321;
            padding: 15px;
            border-radius: 8px;
            border: 1px solid #24324f;
            margin-bottom: 20px;
            gap: 40px;
            flex-wrap: wrap;
        }
        .sw-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            font-weight: bold;
            font-size: 0.9rem;
            color: #94a3b8;
            cursor: pointer;
            text-transform: uppercase;
        }
        .toggle-btn {
            margin-top: 8px;
            width: 80px;
            padding: 10px;
            font-size: 24px;
            font-family: monospace;
            font-weight: bold;
            color: #475569;
            background-color: #1e293b;
            border: 2px solid #334155;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.2s;
        }
        .toggle-btn.on {
            color: #38bdf8;
            border-color: #38bdf8;
            background-color: rgba(56, 189, 248, 0.1);
            text-shadow: 0 0 8px rgba(56, 189, 248, 0.5);
            box-shadow: 0 0 10px rgba(56, 189, 248, 0.2) inset;
        }
        .toggle-btn:hover {
            filter: brightness(1.2);
        }
        .canvas-frame {
            background-color: #090d16;
            border: 1px solid #24324f;
            border-radius: 8px;
            position: relative;
            overflow: auto;
            margin-bottom: 20px;
        }
                canvas {
            display: block;
            margin: 0 auto;
            max-width: 100%;
            height: auto;
        }
        .output-panel {
            display: flex;
            justify-content: space-around;
            gap: 15px;
            background-color: #0e1321;
            padding: 20px;
            border-radius: 8px;
            border: 1px solid #24324f;
            width: 100%;
            align-items: center;
            flex-wrap: wrap;
        }
        .output-box {
            display: flex;
            flex-direction: column;
            align-items: center;
            background: #151d30;
            border: 1px solid #2e4266;
            padding: 15px 20px;
            border-radius: 8px;
            min-width: 120px;
        }
        .output-label {
            color: #94a3b8;
            font-size: 0.85rem;
            text-transform: uppercase;
            font-weight: bold;
            margin-bottom: 10px;
            letter-spacing: 1px;
        }
        .output-value {
            font-family: monospace;
            font-size: 2.5rem;
            font-weight: bold;
            color: #334155;
            background: #090d16;
            padding: 5px 20px;
            border-radius: 6px;
            border: 1px solid #1e293b;
            transition: all 0.2s ease;
            text-align: center;
            min-width: 70px;
        }
        .output-value.active {
            color: #38bdf8;
            border-color: #38bdf8;
            text-shadow: 0 0 12px rgba(56, 189, 248, 0.6);
            box-shadow: 0 0 10px rgba(56, 189, 248, 0.2) inset;
        }
    </style>
</head>
<body>

<div class="bench-container">
    <div class="header-title">
        <h2>Fundamental Logic Gates</h2>
        <div style="text-align: left; max-width: 800px; margin: 0 auto;">
            <p style="margin-bottom: 12px; font-size: 1rem; line-height: 1.5; color: #cbd5e1;">The fundamental logic operators. The core building blocks are: AND, OR, XOR, and INV (NOT) gates.</p>
            <p style="margin-top: 15px; color: #38bdf8; font-style: italic; font-weight: bold; text-align: center;">Toggle inputs A and B below and view the individual gate outputs.</p>
        </div>
    </div>

    <!-- GLOBAL REGISTER SWITCH BUS -->
    <div class="control-strip">
        <div class="sw-container">
            <span>Global Input A</span>
            <button id="btnA" class="toggle-btn" onclick="toggleBtn('A')">0</button>
        </div>
        <div class="sw-container">
            <span>Global Input B</span>
            <button id="btnB" class="toggle-btn" onclick="toggleBtn('B')">0</button>
        </div>
    </div>

    <!-- RENDER WINDOW -->
    <div class="canvas-frame">
        <canvas id="circuitCanvas" width="800" height="420"></canvas>
    </div>

    <!-- TERMINAL OUTPUT SUMMARY -->
    <div class="output-panel">
        <div class="output-box">
            <div class="output-label">AND Out (C)</div>
            <div id="out-and" class="output-value">0</div>
        </div>
        <div class="output-box">
            <div class="output-label">OR Out (C)</div>
            <div id="out-or" class="output-value">0</div>
        </div>
        <div class="output-box">
            <div class="output-label">XOR Out (C)</div>
            <div id="out-xor" class="output-value">0</div>
        </div>
        <div class="output-box">
            <div class="output-label">INV Out (C)</div>
            <div id="out-inv" class="output-value">0</div>
        </div>
    </div>
</div>

<script>
    const canvas = document.getElementById('circuitCanvas');
    const ctx = canvas.getContext('2d');

    // Input States
    let stateA = 0;
    let stateB = 0;

    function toggleBtn(inputName) {
        let btn;
        if (inputName === 'A') {
            stateA = stateA ? 0 : 1;
            btn = document.getElementById('btnA');
            btn.innerText = stateA;
            btn.className = stateA ? 'toggle-btn on' : 'toggle-btn';
        } else if (inputName === 'B') {
            stateB = stateB ? 0 : 1;
            btn = document.getElementById('btnB');
            btn.innerText = stateB;
            btn.className = stateB ? 'toggle-btn on' : 'toggle-btn';
        }
        drawCircuit();
    }

    function drawCircuit() {
        const A = stateA;
        const B = stateB;

        // Gate Logic Outputs
        const outAND = A & B;
        const outOR = A | B;
        const outXOR = A ^ B;
        const outINV = A ? 0 : 1; // Only taking A as input for INV

        // Clean view canvas
        ctx.clearRect(0, 0, canvas.width, canvas.height);

        // Wire tracing styler
        function setWireColor(signal) {
            if (signal === 1) {
                ctx.strokeStyle = '#38bdf8';
                ctx.shadowColor = '#38bdf8';
                ctx.shadowBlur = 6;
                ctx.lineWidth = 3;
            } else {
                ctx.strokeStyle = '#1e293b';
                ctx.shadowBlur = 0;
                ctx.lineWidth = 2;
            }
        }

        // Logical bit value sticker
        function drawBitValue(val, x, y) {
            ctx.save();
            ctx.shadowBlur = 0;
            ctx.fillStyle = val === 1 ? '#38bdf8' : '#334155';
            ctx.fillRect(x - 8, y - 8, 16, 16);
            ctx.strokeStyle = '#475569';
            ctx.lineWidth = 1;
            ctx.strokeRect(x - 8, y - 8, 16, 16);
            ctx.fillStyle = '#ffffff';
            ctx.font = 'bold 11px monospace';
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            ctx.fillText(val, x, y);
            ctx.restore();
        }

                // Gate logic symbol drawer
        function drawGateIcon(type, x, y) {
            ctx.save();
            ctx.shadowBlur = 0;
            ctx.lineWidth = 2;
            ctx.strokeStyle = '#94a3b8';
            ctx.fillStyle = '#151d30';

            ctx.translate(x, y);
            ctx.scale(1.5, 1.5);

            ctx.beginPath();
            if (type === 'AND') {
                ctx.moveTo(-20, -15);
                ctx.lineTo(0, -15);
                ctx.arc(0, 0, 15, -Math.PI / 2, Math.PI / 2, false);
                ctx.lineTo(-20, 15);
                ctx.closePath();
            } else if (type === 'OR') {
                ctx.moveTo(-20, -15);
                ctx.quadraticCurveTo(-10, 0, -20, 15);
                ctx.quadraticCurveTo(0, 15, 25, 0);
                ctx.quadraticCurveTo(0, -15, -20, -15);
            } else if (type === 'XOR') {
                ctx.moveTo(-20, -15);
                ctx.quadraticCurveTo(-10, 0, -20, 15);
                ctx.moveTo(-16, -15);
                ctx.quadraticCurveTo(-6, 0, -16, 15);
                ctx.moveTo(-11, -15);
                ctx.lineTo(0, -15);
                ctx.quadraticCurveTo(15, -12, 25, 0);
                ctx.quadraticCurveTo(15, 12, 0, 15);
                ctx.lineTo(-11, 15);
                ctx.quadraticCurveTo(-1, 0, -11, -15);
            } else if (type === 'INV') {
                ctx.moveTo(-15, -15);
                ctx.lineTo(-15, 15);
                ctx.lineTo(10, 0);
                ctx.closePath();
            }
            ctx.fill();
            ctx.stroke();

            // Negation Circle for INV
            if (type === 'INV') {
                ctx.beginPath();
                ctx.arc(15, 0, 5, 0, Math.PI * 2);
                ctx.fill();
                ctx.stroke();
            }

            // Text Label
            ctx.fillStyle = '#f8fafc';
            ctx.font = 'bold 10px sans-serif';
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            if (type === 'INV') {
                ctx.fillText(type, -5, 0);
            } else {
                ctx.fillText(type, -2, 0);
            }
            ctx.restore();
        }














                // ---------------------------------------------------------
        // ROW 1: AND (Left), OR (Right)
        // ---------------------------------------------------------
        
        // AND Gate Wires (Center at 220, 110)
        setWireColor(A);
        ctx.beginPath(); ctx.moveTo(90, 95); ctx.lineTo(190, 95); ctx.stroke();
        
        setWireColor(B);
        ctx.beginPath(); ctx.moveTo(90, 125); ctx.lineTo(190, 125); ctx.stroke();
        
        setWireColor(outAND);
        ctx.beginPath(); ctx.moveTo(245, 110); ctx.lineTo(330, 110); ctx.stroke();

        // OR Gate Wires (Center at 580, 110)
        setWireColor(A);
        ctx.beginPath(); ctx.moveTo(450, 95); ctx.lineTo(550, 95); ctx.stroke();
        
        setWireColor(B);
        ctx.beginPath(); ctx.moveTo(450, 125); ctx.lineTo(550, 125); ctx.stroke();
        
        setWireColor(outOR);
        ctx.beginPath(); ctx.moveTo(620, 110); ctx.lineTo(700, 110); ctx.stroke();


        // ---------------------------------------------------------
        // ROW 2: XOR (Left), INV (Right)
        // ---------------------------------------------------------

        // XOR Gate Wires (Center at 220, 290)
        setWireColor(A);
        ctx.beginPath(); ctx.moveTo(90, 275); ctx.lineTo(190, 275); ctx.stroke();
        
        setWireColor(B);
        ctx.beginPath(); ctx.moveTo(90, 305); ctx.lineTo(190, 305); ctx.stroke();
        
        setWireColor(outXOR);
        ctx.beginPath(); ctx.moveTo(260, 290); ctx.lineTo(330, 290); ctx.stroke();

        // INV Gate Wires (Center at 580, 290)
        setWireColor(A);
        ctx.beginPath(); ctx.moveTo(450, 290); ctx.lineTo(550, 290); ctx.stroke();
        
        setWireColor(outINV);
        ctx.beginPath(); ctx.moveTo(615, 290); ctx.lineTo(700, 290); ctx.stroke();












        // ---------------------------------------------------------






















        // DRAW GATES ON TOP OF WIRES
        // ---------------------------------------------------------
        drawGateIcon('AND', 220, 110);
        drawGateIcon('OR', 580, 110);
        drawGateIcon('XOR', 220, 290);
        drawGateIcon('INV', 580, 290);


        // ---------------------------------------------------------
        // LABELS AND DATA STICKERS
        // ---------------------------------------------------------
        ctx.fillStyle = '#94a3b8';
        ctx.font = 'bold 14px monospace';
        
        // Input / Output Text Labels
        ctx.textAlign = 'right'; ctx.textBaseline = 'middle';
        ctx.fillText('A', 75, 95); ctx.fillText('B', 75, 125);
        ctx.fillText('A', 435, 95); ctx.fillText('B', 435, 125);
        ctx.fillText('A', 75, 275); ctx.fillText('B', 75, 305);
        ctx.fillText('A', 435, 290);

        ctx.textAlign = 'left';
        ctx.fillText('C', 345, 110);
        ctx.fillText('C', 715, 110);
        ctx.fillText('C', 345, 290);
        ctx.fillText('C', 715, 290);

        // Value Stickers for AND
        drawBitValue(A, 90, 95); drawBitValue(B, 90, 125); drawBitValue(outAND, 330, 110);
        // Value Stickers for OR
        drawBitValue(A, 450, 95); drawBitValue(B, 450, 125); drawBitValue(outOR, 700, 110);
        // Value Stickers for XOR
        drawBitValue(A, 90, 275); drawBitValue(B, 90, 305); drawBitValue(outXOR, 330, 290);
        // Value Stickers for INV
        drawBitValue(A, 450, 290); drawBitValue(outINV, 700, 290);


        // ---------------------------------------------------------
        // UPDATE HTML BOTTOM PANEL OUTPUTS
        // ---------------------------------------------------------
        const elmAND = document.getElementById('out-and');
        elmAND.innerText = outAND;
        elmAND.className = outAND ? 'output-value active' : 'output-value';

        const elmOR = document.getElementById('out-or');
        elmOR.innerText = outOR;
        elmOR.className = outOR ? 'output-value active' : 'output-value';

        const elmXOR = document.getElementById('out-xor');
        elmXOR.innerText = outXOR;
        elmXOR.className = outXOR ? 'output-value active' : 'output-value';

        const elmINV = document.getElementById('out-inv');
        elmINV.innerText = outINV;
        elmINV.className = outINV ? 'output-value active' : 'output-value';
    }

    // Initialize layout
    drawCircuit();
</script>

</body>
</html>
